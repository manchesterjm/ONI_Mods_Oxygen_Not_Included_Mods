title: Skill and Stats Progress (Revived)
description: Full revival of the removed Skill and Stats Progress mod. Floating XP reports over duplicants when they start and finish work, XP numbers and percent on the Attributes panel, skill-point XP on the resume, optional per-window XP deltas, speed and travel-distance readouts. Configure from the Options button in the Mods screen. Disable SkillStatsLite - this replaces it.
staticID: SkillStatsProgressRevived
