title: Temperature Filters (Liquid + Gas)
description: Adds a Liquid Temperature Filter and a Gas Temperature Filter — vanilla-filter clones that sort by TEMPERATURE instead of element. In Above mode contents warmer than the per-building threshold leave through the filtered port; cooler contents continue through the normal output. Unlocked by the same techs as the vanilla filters, placed beside them in the build menu. Original mod.
staticID: TemperatureFilters
