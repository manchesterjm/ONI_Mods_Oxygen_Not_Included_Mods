title: Critter Condos Anywhere
description: Lets all three base-game Critter Condos (land, Aquatic, Airborne) be built and used outside of a Stable room. Removes the "Dedicated Room: Stable" requirement while keeping each condo's other conditions (the Aquatic condo still needs liquid, the land condo still needs to be un-flooded). Original mod.
staticID: CritterCondoAnywhere
